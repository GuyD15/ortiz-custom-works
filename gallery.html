<body class="tail-container text-zinc-800 antialiased">

  <!-- HEADER -->
  <header class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="flex items-center gap-4">
        <img src="ortiz_logo.jpg" alt="Ortiz Custom Works" class="h-14">
        <div>
          <h1 class="text-3xl font-bold tracking-tight" style="color: black;">ORTIZ <span style="color: var(--primary);">C</span>USTOM WORKS</h1>
          <p class="text-sm text-orange-600 -mt-1">Customized Spaces for Your Home</p>
        </div>
      </div>

      <!-- Phone Number (Centered) -->
      <a href="tel:4078032087" class="hidden md:flex items-center gap-2 font-semibold text-lg">
        <i class="fa-solid fa-phone text-orange-600"></i> (407) 803-2087
      </a>

      <!-- Desktop Nav -->
      <nav class="hidden md:flex items-center gap-8 text-lg font-medium">
        <a href="index.html" class="hover:text-orange-600 transition">Home</a>
        <a href="about.html" class="hover:text-orange-600 transition">About us</a>
        <a href="contact.html" class="hover:text-orange-600 transition">Contact</a>
        <a href="reviews.html" class="hover:text-orange-600 transition">Reviews</a>
        <a href="services.html" class="hover:text-orange-600 transition">Services</a>

      <!-- Mobile menu button -->
      <div class="md:hidden">
        <button id="mobile-menu-button" class="p-2 text-zinc-800">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none"
               viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      </div>
    </div>
    <!-- Mobile Nav -->
    <nav id="mobile-menu" class="md:hidden bg-white shadow-lg hidden">
      <div class="px-2 pt-2 pb-3 space-y-1">
        <a href="index.html" class="block px-3 py-2 rounded-md text-base font-medium hover:bg-zinc-100">Home</a>
        <a href="about.html" class="block px-3 py-2 rounded-md text-base font-medium hover:bg-zinc-100">About us</a>

        <a href="pay-bill.html" class="block px-3 py-2 rounded-md text-base font-medium bg-orange-100 text-[var(--primary)] hover:bg-orange-200 font-semibold">Pay Bill</a>

  <!-- PAGE CONTENT (unique per page) -->
  <!-- mobile menu script added below -->

    </section>
  </main>

  <!-- FOOTER (same on every page) -->
  <footer class="...">...</footer>

  <script>
    tailwind.config = { content: ["*"] };
    const menuBtnGal = document.getElementById('mobile-menu-button');
    const mobileMenuGal = document.getElementById('mobile-menu');
    if (menuBtnGal && mobileMenuGal) {
      menuBtnGal.addEventListener('click', () => {
        mobileMenuGal.classList.toggle('hidden');
      });
    }
  </script>
  <!-- Chatbot Widget -->
  <script src="api-config.js"></script>
  <script src="chatbot.js"></script>
